name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: dropdown
    id: project
    attributes:
      label: "Project"
      options:
        - "<SELECT A PROJECT>"
        - "0,5 HP"
        - "1 Hit"
        - "All Mobs are Creepers"
        - "Antigravity"
        - "Auto Aim"
        - "Better GUI"
        - "Bizarre West"
        - "Bugrock"
        - "Bunny Hop"
        - "Can't Go Down"
        - "Can't Touch Water"
        - "Chroma Key - Green Screen"
        - "Coords"
        - "Death Coordinates"
        - "Death Locator"
        - "Death Note"
        - "Donkey Spawn Egg Meme"
        - "Dream's Compass"
        - "Dye Textures Backport"
        - "Emerald Items"
        - "Expansion of Border"
        - "Fix Firefly Bush Framerate"
        - "FNAF Dreams and Nightmares"
        - "Forgetful Sniffer"
        - "Ice Track"
        - "Icons - Additions"
        - "Infinite Items"
        - "Instant Respawn Always"
        - "Items Timer"
        - "Keep Inventory Always"
        - "Low Contrast Resin"
        - "Max Speed"
        - "MineChess"
        - "More Kills More Damage"
        - "More Xp More Health"
        - "More Xp More Size"
        - "Name Tag Backport"
        - "No Outline"
        - "Pixelation"
        - "PVP Arena"
        - "Random Size"
        - "RGB Water"
        - "Rubiks Cube"
        - "Saddle Backport"
        - "SUS Blocks"
        - "Timer for Speedrun"
        - "X Ray"
        - "Перевод Модов"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Project version
      placeholder: ex. 1.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe your issue
      placeholder: When I click here this happens
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Click here
        2. Click there
    validations:
      required: true
  - type: textarea
    id: solve
    attributes:
      label: A way to solve the issue
      placeholder: Something you could suggest to solve the issue